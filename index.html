<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Contact</title>
<style>
  :root{
    --bg: #14241f;
    --card: #1c332b;
    --accent: #d4a35a;
    --text: #f3efe7;
    --muted: #9fb3ab;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    height:100%;
    background: radial-gradient(circle at 50% 0%, #1d3a31 0%, var(--bg) 60%);
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    color: var(--text);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  body{
    padding: 20px;
  }
  .card{
    background: var(--card);
    border-radius: 20px;
    padding: 36px 28px 32px;
    width: 100%;
    max-width: 380px;
    text-align:center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    border: 1px solid rgba(212,163,90,0.15);
  }
  @media (min-width: 600px){
    .card{
      max-width: 420px;
      padding: 44px 36px 38px;
    }
    h1{ font-size: 21px; }
    p.sub{ font-size: 14.5px; }
    .btn{ font-size: 16px; padding: 15px 18px; }
  }
  @media (max-width: 340px){
    .card{ padding: 28px 18px 26px; border-radius: 16px; }
    h1{ font-size: 17px; }
    .btn{ font-size: 14px; padding: 13px 14px; }
  }
  .icon{
    width:54px;
    height:54px;
    margin:0 auto 14px;
    background: var(--accent);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
  }
  h1{
    font-size: 19px;
    margin: 0 0 4px;
    font-weight:600;
    letter-spacing:0.2px;
  }
  p.sub{
    margin: 0 0 26px;
    color: var(--muted);
    font-size: 13.5px;
  }
  .btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding:14px 18px;
    margin-bottom:14px;
    border-radius:12px;
    border:none;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    text-decoration:none;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  .btn:active{ transform: scale(0.97); }
  .btn-call{
    background: var(--accent);
    color: #14241f;
  }
  .btn-msg{
    background: transparent;
    color: var(--text);
    border: 1.5px solid rgba(243,239,231,0.25);
  }
  .btn:hover{ opacity:0.92; }
  .foot{
    margin-top: 18px;
    font-size: 11.5px;
    color: var(--muted);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">🏠</div>
    <h1>Room Contact</h1>
    <p class="sub">Call korun othoba Message diye reply nin</p>

    <a class="btn btn-call" href="tel:+8801575123393">
      📞 Call Korun
    </a>
    <a class="btn btn-msg" href="https://www.facebook.com/israfildeimos/" target="_blank" rel="noopener">
      💬 Message Korun
    </a>

    <div class="foot">Reply pabe message korle</div>
  </div>
</body>
</html>
